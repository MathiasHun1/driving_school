<footer class="site-footer">
  <div class="container site-footer__grid">
    <section>
      <h3>{{ contact.school }}</h3>
      <p>{{ contact.address }}</p>
      <p><a href="tel:+36309382689">{{ contact.phone }}</a></p>
      <p><a [href]="'mailto:' + contact.email">{{ contact.email }}</a></p>
    </section>

    <section>
      <h4>Oldalak</h4>
      <div class="links">
        @for (item of nav; track item.path) {
          <a [routerLink]="item.path">{{ item.label }}</a>
        }
      </div>
    </section>

    <section>
      <h4>Tájékoztató</h4>
      <div class="links">
        @for (item of info; track item.path) {
          <a [routerLink]="item.path">{{ item.label }}</a>
        }
      </div>
    </section>
  </div>

  <div class="container site-footer__bottom">© {{ year }} {{ contact.school }} - Minden jog fenntartva.</div>
</footer>
