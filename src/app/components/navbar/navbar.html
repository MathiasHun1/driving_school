<header class="site-header">
  <div class="container site-header__top">
    <a class="brand" routerLink="/" (click)="closeMenu()">
      <img src="logo.png" alt="Mocisuli Gödöllő" width="88" height="88" />
      <div>
        <strong>Mocisuli</strong>
        <span>Gödöllő</span>
      </div>
    </a>

    <button class="menu-toggle" type="button" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen">
      Menü
    </button>

    <div class="contact">
      <a href="tel:+36309382689">06 30 938 26 89</a>
      <small>2100 Gödöllő, Dózsa György út 13.</small>
    </div>
  </div>

  <nav class="container site-header__nav" [class.is-open]="isMenuOpen">
    @for (item of primary; track item.path) {
      <a [routerLink]="item.path" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: item.path === '/' }" (click)="closeMenu()">
        {{ item.label }}
      </a>
    }
  </nav>

</header>
