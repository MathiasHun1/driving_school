<main class="page page-shell">
  <section class="container info-page">
    <header class="info-head">
      <p>Tájékoztató</p>
      <h1>VÁLLALKOZÁSI FELTÉTELEK ÉS TANULÓ TÁJÉKOZTATÓ</h1>
      <span>Kattintásra a releváns PDF fájl letöltődik.</span>
    </header>

    <ul class="doc-list" aria-label="Tájékoztató dokumentumok">
      @for (doc of docs; track doc.file) {
        <li class="doc-item">
          <div class="doc-item__title">{{ doc.title }}</div>
          <a class="doc-item__link" [href]="pdfPath(doc.file)" [attr.download]="doc.file">
            További információk
          </a>
        </li>
      }
    </ul>
  </section>
</main>
