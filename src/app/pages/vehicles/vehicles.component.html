<main class="page page-shell">
  <section class="container vehicles-page">
    <header class="head">
      <p>Oktató járművek</p>
      <h1>Járműparkunk</h1>
      <span>A mocisuli.hu oldalon szereplő modellek, megújított kártyaelrendezésben.</span>
    </header>

    <ul class="vehicle-grid" aria-label="Oktató járművek listája">
      @for (vehicle of vehicles; track vehicle.name) {
        <li class="vehicle-card">
          <div class="vehicle-card__image" role="img" [attr.aria-label]="vehicle.name + ' kép helye'">
            <span>{{ vehicle.name }}</span>
            <small>Kép helye</small>
          </div>
          <div class="vehicle-card__content">
            <h2>{{ vehicle.name }}</h2>
            <p>{{ vehicle.text }}</p>
          </div>
        </li>
      }
    </ul>
  </section>
</main>
