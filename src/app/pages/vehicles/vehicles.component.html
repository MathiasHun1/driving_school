<main class="page page-shell">
  <section class="container">
    <header class="head">
      <p>Járművek</p>
      <h1>Kategóriánként válogatott oktatómotorok</h1>
    </header>

    <div class="grid">
      @for (vehicle of list; track vehicle.category) {
        <article class="panel card">
          <span class="card__badge">{{ vehicle.category }}</span>
          <h2>{{ vehicle.model }}</h2>
          <p class="card__power">{{ vehicle.power }}</p>
          <p>{{ vehicle.notes }}</p>
        </article>
      }
    </div>
  </section>
</main>
